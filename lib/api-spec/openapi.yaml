openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: identify
    description: Movie identification
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /identify:
    post:
      operationId: identifyMovie
      tags: [identify]
      summary: Identify a movie from a URL or description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentifyRequest"
      responses:
        "200":
          description: Movie identified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifyResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    IdentifyRequest:
      type: object
      properties:
        url:
          type: string
          description: Video URL shared from TikTok or social media
        description:
          type: string
          description: Text description of the movie scene
      minProperties: 1
    IdentifyResponse:
      type: object
      properties:
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        description:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]
      required:
        - title
        - confidence
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
