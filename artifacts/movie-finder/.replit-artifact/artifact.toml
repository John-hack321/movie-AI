kind = "mobile"
previewPath = "/"
title = "CineID - Movie Finder"
version = "1.0.0"
id = "artifacts/movie-finder"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25341

[services.development]
run = "pnpm --filter @workspace/movie-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/movie-finder", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/movie-finder", "run", "serve" ]

[services.env]
PORT = "25341"
BASE_PATH = "/"
